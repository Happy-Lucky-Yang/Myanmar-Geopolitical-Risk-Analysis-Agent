# ========================================
# 缅甸地缘风险智能分析原型系统 - 配置文件
# ========================================

# ---------- 大模型 API ----------
llm:
  # 实验室部署的大模型地址（兼容 OpenAI Chat Completions 格式）
  base_url: "http://your-lab-server:8000/v1"
  api_key: "your-api-key-here"
  model_name: "geopolitical-gpt"
  temperature: 0.3
  max_tokens: 2048

# ---------- 爬虫配置 ----------
crawler:
  # 定时抓取间隔（小时）
  interval_hours: 4
  # 请求超时（秒）
  timeout: 15
  # 最大重试次数
  max_retries: 3
  # 重试退避基数（秒），实际延迟 = backoff * 2^attempt
  backoff: 2
  # 列表页最大翻页数
  max_pages: 3
  # 默认 User-Agent
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/125.0"
  # 目标来源
  sources:
    - name: "缅甸缅华网"
      url: "https://www.mhwmm.com/miandianxinwen/"
      enabled: true
      language: "zh"
    - name: "路透社缅甸"
      url: "https://www.reuters.com/world/asia-pacific/myanmar/"
      enabled: false   # 反爬较强，初期先关闭
      language: "en"
    - name: "伊洛瓦底报"
      url: "https://www.irrawaddy.com/news/burma"
      enabled: false   # 已迁移至 myanmar_now_crawler.py
      language: "en"
    - name: "Myanmar Now"
      url: "https://www.myanmar-now.org/en/news"
      enabled: true    # 通过 myanmar_now_crawler.py 爬取
      language: "en"

# ---------- GDELT 全球事件数据库 ----------
gdelt:
  enabled: true                      # 是否启用 GDELT 数据源
  api_url: "https://api.gdeltproject.org/api/v2/doc/doc"
  language: "english"                 # 语言过滤（english / chinese / 留空=全部）
  source_country: "BM"                # 来源国家代码（BM=缅甸, 留空=全部）
  timespan_days: 7                    # 默认查询最近多少天
  max_results: 100                    # 每次查询最大返回条数
  max_retries: 3                      # 请求重试次数
  timeout: 30                         # 请求超时（秒）
  backoff: 5                          # 重试退避基数（GDELT 要求每 5 秒一个请求）
  use_multi_query: true               # 使用多关键词查询（覆盖面更广）
  # 多关键词查询列表（use_multi_query=true 时使用，支持中英文混合）
  query_keywords:
    - "Myanmar conflict"
    - "Myanmar military ceasefire"
    - "Myanmar refugee crisis"
    - "Myanmar sanctions"
    - "Myanmar China economic"
    - "缅甸 冲突"                   # 中文查询（自动语言检测）
    - "缅甸 制裁"                   # 中文查询
    - "缅甸 难民"                   # 中文查询

# ---------- RSS/Atom 新闻源 ----------
rss_feeds:
  frontier_myanmar:
    name: "Frontier Myanmar"
    rss_url: "https://www.frontiermyanmar.net/en/feed"
    enabled: true
    language: "en"
  dvb:
    name: "Democratic Voice of Burma"
    rss_url: "https://www.dvb.no.org/feed"
    enabled: true
    language: "en"
  diplomat_myanmar:
    name: "The Diplomat (Myanmar)"
    rss_url: "https://thediplomat.com/feed/"
    enabled: false   # 有付费墙，先关闭
    language: "en"

# ---------- 数据存储 ----------
storage:
  # 新闻数据存放目录
  news_dir: "./data/raw"
  # 输出格式: csv / json
  format: "json"

# ---------- 风险评分权重 ----------
risk_weights:
  conflict_frequency: 0.30    # 冲突频次
  sentiment_avg: 0.25         # 情感均值（负面程度）
  nightlight_change: 0.20     # 夜间灯光变化率
  refugee_change: 0.15        # 难民变化
  event_severity: 0.10        # 事件严重程度

# ---------- 趋势分析 ----------
trend:
  # 移动平均窗口（天）
  moving_avg_window: 7
  # 回归分析最少需要数据点数
  min_regression_points: 14

# ---------- 定时调度器 ----------
scheduler:
  enabled: true                        # 是否启用自动定时爬取
  crawl_interval_hours: 4              # 缅华网爬取间隔（小时）
  gdelt_interval_hours: 6              # GDELT 查询间隔（小时）
  analysis_interval_hours: 12          # 分析流水线间隔（小时）

# ---------- Flask 服务 ----------
flask:
  host: "0.0.0.0"
  port: 5000
  debug: true

# ---------- Neo4j（可选） ----------
neo4j:
  enabled: false
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "your-neo4j-password"
