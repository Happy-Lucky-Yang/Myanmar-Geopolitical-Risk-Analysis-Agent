<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缅甸地缘风险分析 - 风险地图</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        #map-container {
            width: 100%;
            height: 70vh;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        #map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">缅甸地缘风险智能分析系统</div>
        <ul class="nav-links">
            <li><a href="/">对话分析</a></li>
            <li><a href="/map" class="active">风险地图</a></li>
            <li><a href="/trend">趋势预测</a></li>
        </ul>
    </nav>

    <main class="container">
        <section>
            <h2>缅甸省级风险热力地图</h2>
            <p class="subtitle">颜色深浅反映各省份综合风险评分，鼠标悬停查看详情</p>

            <div class="controls">
                <label>查看最近
                    <select id="days-select" onchange="loadMap()">
                        <option value="7">7天</option>
                        <option value="14">14天</option>
                        <option value="30" selected>30天</option>
                    </select>
                    数据
                </label>
            </div>

            <div id="map-container">
                <p style="text-align:center; padding:40px;">加载中...</p>
            </div>
        </section>
    </main>

    <script>
        async function loadMap() {
            const days = document.getElementById('days-select').value;
            const container = document.getElementById('map-container');
            container.innerHTML = '<p style="text-align:center; padding:40px;">加载中...</p>';

            try {
                const response = await fetch(`/api/map?days=${days}`);
                const html = await response.text();
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<p style="text-align:center; color:red;">加载失败: ${e.message}</p>`;
            }
        }

        // 页面加载时自动加载地图
        loadMap();
    </script>
</body>
</html>
