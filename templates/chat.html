<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缅甸地缘风险分析 - 对话分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">缅甸地缘风险智能分析系统</div>
        <ul class="nav-links">
            <li><a href="/" class="active">对话分析</a></li>
            <li><a href="/map">风险地图</a></li>
            <li><a href="/trend">趋势预测</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="analysis-section">
            <h2>新闻文本分析</h2>
            <p class="subtitle">粘贴缅甸相关新闻文本，点击分析按钮获取结构化结果</p>

            <div class="input-area">
                <textarea id="news-input" placeholder="请输入或粘贴缅甸相关新闻内容..." rows="8"></textarea>
                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <button id="analyze-btn" onclick="analyzeText()">开始分析</button>
                    <button onclick="fillSampleText()" style="background:#6c757d;">填充示例文本</button>
                </div>
            </div>

            <div id="result-area" class="result-area" style="display:none;">
                <h3>分析结果</h3>

                <div class="result-grid">
                    <div class="result-card">
                        <h4>命名实体</h4>
                        <div id="entities-result"></div>
                    </div>

                    <div class="result-card">
                        <h4>情感分析</h4>
                        <div id="sentiment-result"></div>
                    </div>

                    <div class="result-card">
                        <h4>风险评分</h4>
                        <div id="risk-result"></div>
                    </div>

                    <div class="result-card">
                        <h4>大模型分析</h4>
                        <div id="llm-result"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // 示例文本
        const SAMPLE_TEXT = `缅甸军方与克钦独立军在掸邦北部发生武装冲突\n\n据缅华网报道，2026年6月14日凌晨，缅甸军方与克钦独立军在掸邦北部抹谷镇附近发生激烈交火。冲突持续约4小时，造成双方多人伤亡。当地居民称，军方出动了空中力量进行轰炸，导致多个村庄的平民被迫转移。\n\n克钦独立军发言人表示，此次冲突是由于军方违反停火协议，对克钦独立军控制区发动进攻所致。缅甸军方尚未对此事发表正式声明。\n\n分析人士指出，此次冲突可能会影响中缅经济走廊相关项目的推进，并对边境地区的安全形势产生负面影响。联合国难民署表示，已有约2000名平民逃离冲突区域，涌向中国边境方向。`;

        function fillSampleText() {
            document.getElementById('news-input').value = SAMPLE_TEXT;
        }

        async function analyzeText() {
            const text = document.getElementById('news-input').value.trim();
            if (!text) {
                alert('请输入新闻文本');
                return;
            }

            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.textContent = '分析中...';

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text})
                });
                const data = await response.json();

                if (data.success) {
                    displayResults(data.data);
                } else {
                    alert('分析失败: ' + data.error);
                }
            } catch (e) {
                alert('请求失败: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '开始分析';
            }
        }

        function displayResults(data) {
            document.getElementById('result-area').style.display = 'block';

            // 实体
            const ent = data.entities || {};
            document.getElementById('entities-result').innerHTML = `
                <p><strong>地名:</strong> ${(ent.locations || []).join('、') || '无'}</p>
                <p><strong>组织:</strong> ${(ent.organizations || []).join('、') || '无'}</p>
                <p><strong>人物:</strong> ${(ent.persons || []).join('、') || '无'}</p>
            `;

            // 情感
            const sent = data.sentiment || {};
            document.getElementById('sentiment-result').innerHTML = `
                <p>情感分: <strong>${sent.sentiment_score || 'N/A'}</strong></p>
                <p>风险分: <strong>${sent.risk_score || 'N/A'}</strong></p>
                <p>风险等级: <span class="risk-badge ${sent.risk_level}">${sent.risk_level || 'N/A'}</span></p>
            `;

            // 风险
            const risk = data.risk_score || {};
            document.getElementById('risk-result').innerHTML = `
                <p>综合风险分: <strong style="font-size:1.5em">${risk.risk_score || 'N/A'}</strong>/100</p>
                <p>风险等级: <span class="risk-badge ${risk.risk_level}">${risk.risk_level || 'N/A'}</span></p>
            `;

            // LLM
            const llm = data.llm_analysis || {};
            if (llm.error) {
                document.getElementById('llm-result').innerHTML = `<p class="error">${llm.error}</p>`;
            } else {
                document.getElementById('llm-result').innerHTML = `
                    <p><strong>事件类型:</strong> ${llm.event_type || 'N/A'}</p>
                    <p><strong>中缅影响:</strong> ${llm.china_myanmar_impact || 'N/A'}</p>
                    <p><strong>风险提示:</strong> ${llm.risk_warning || 'N/A'}</p>
                    <p><strong>摘要:</strong> ${llm.summary || 'N/A'}</p>
                `;
            }
        }
    </script>
</body>
</html>
